<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoria Home Care - Plano Servir</title>
    
    <!-- Tailwind CSS para o aspeto visual -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React e ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para compilar o React no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    
    <!-- Onde a Aplicação vai ser renderizada -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Função para processar CSV (lida com vírgulas e aspas corretamente)
        function parseCSV(text) {
            let p = '', row = [''], ret = [row], i = 0, r = 0, s = !0, l;
            for (l of text) {
                if ('"' === l) {
                    if (s && l === p) row[i] += l;
                    s = !s;
                } else if (',' === l && s) l = row[++i] = '';
                else if ('\n' === l && s) {
                    if ('\r' === p) row[i] = row[i].slice(0, -1);
                    row = ret[++r] = [l = '']; i = 0;
                } else row[i] += l;
                p = l;
            }
            return ret;
        }

        const limparValor = (valorStr) => {
            if (!valorStr) return 0.0;
            const limpo = valorStr.toUpperCase().replace("R$", "").replace(/\s/g, "").replace(/\./g, "").replace(",", ".");
            return parseFloat(limpo) || 0.0;
        };

        const getPreliminaryStatus = (item) => {
            const valorOriginal = item['VALOR (FRAÇÃO)'] || item.VALOR || '0';
            const valor = limparValor(valorOriginal);
            const ap = (item.APRESENTAÇÃO || '').toUpperCase();
            const desc = (item.DESCRIÇÃO || '').toUpperCase();

            // Regras expressas no nome
            if (/(ANTIBIÓTICO|ANTIBIOTICO|MICA|ANFO|ALBUMINA|QUIMIO|IMUNO)/i.test(desc)) {
                return { text: "Necessário Autorização do Plano Servir", type: 'warn' };
            }
            // Regra Sólidos
            if (/(CP|CAP|DRG|COMP)/i.test(ap)) {
                return valor <= 5.00 ? { text: "Item Incluso", type: 'success' } : { text: "Necessário Autorização do Plano Servir", type: 'warn' };
            }
            // Regra Líquidos/Físicos
            if (/(FR|ML|AMP|SACH|SOL|SUSP|GTS|FA|SER)/i.test(ap)) {
                return valor <= 35.00 ? { text: "Item Incluso", type: 'success' } : { text: "Necessário Autorização do Plano Servir", type: 'warn' };
            }
            // Fallback
            return valor <= 35.00 ? { text: "Análise Pendente", type: 'neutral' } : { text: "Necessário Autorização do Plano Servir", type: 'warn' };
        };

        function App() {
            const [db, setDb] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [error, setError] = useState(null);

            const [searchTerm, setSearchTerm] = useState('');
            const [selectedItem, setSelectedItem] = useState(null);
            
            const [tipo, setTipo] = useState('');
            const [classe, setClasse] = useState('COMUM');
            const [analisePronta, setAnalisePronta] = useState(null);

            const resultRef = useRef(null);
            
            useEffect(() => {
                const fetchData = async () => {
                    try {
                        // LINK CORRETO E PÚBLICO: Utilizando a API nativa do Google (gviz) com o ID original da sua planilha
                        const PUBLISHED_URL = "https://docs.google.com/spreadsheets/d/1It6vt6HqmtC8T749v5uLyQP0UhJQEPhkK-lg4RWor0g/gviz/tq?tqx=out:csv";
                        
                        const response = await fetch(PUBLISHED_URL);
                        
                        if (!response.ok) {
                            throw new Error(`O servidor respondeu com erro HTTP ${response.status}`);
                        }
                        
                        const csvText = await response.text();

                        const rawData = parseCSV(csvText);
                        const headers = rawData[0].map(h => h ? h.trim().toUpperCase() : '');
                        
                        const parsedData = rawData.slice(1).map(row => {
                            let obj = {};
                            headers.forEach((header, index) => {
                                if (header) obj[header] = row[index] ? row[index].trim() : '';
                            });
                            return obj;
                        }).filter(item => item.CÓDIGO || item.DESCRIÇÃO);

                        if (parsedData.length === 0) {
                            throw new Error("A folha de cálculo foi lida, mas não foi possível encontrar dados nas colunas CÓDIGO ou DESCRIÇÃO.");
                        }

                        setDb(parsedData);
                        setIsLoading(false);
                    } catch (err) {
                        console.error("Erro Fatal:", err);
                        // Verifica se o usuário está abrindo o arquivo direto do computador
                        if (window.location.protocol === 'file:') {
                            setError("🔒 Bloqueio de Segurança Local (Failed to fetch): O seu navegador bloqueou a conexão porque você está abrindo o arquivo direto do seu computador (C:/...). Salve este arquivo, faça o commit/upload no GitHub e abra pelo link do GitHub Pages. Lá vai funcionar perfeitamente!");
                        } else {
                            setError(err.message);
                        }
                        setIsLoading(false);
                    }
                };
                fetchData();
            }, []);

            const searchResults = useMemo(() => {
                if (!searchTerm || db.length === 0) return [];
                const lowerSearch = searchTerm.toLowerCase();
                return db.filter(item => 
                    (item.DESCRIÇÃO && item.DESCRIÇÃO.toLowerCase().includes(lowerSearch)) ||
                    (item.CÓDIGO && item.CÓDIGO.includes(lowerSearch))
                ).slice(0, 15);
            }, [searchTerm, db]);

            const handleSelect = (item) => {
                setSelectedItem(item);
                setSearchTerm('');
                setAnalisePronta(null);
                
                // Pré-seleciona tipo de medida se reconhecer a sigla
                const ap = (item.APRESENTAÇÃO || '').toUpperCase();
                if (/(CP|CAP|DRG|COMP)/i.test(ap)) setTipo('SOLIDO');
                else if (/(FR|ML|AMP|SACH|SOL|SUSP|GTS|FA|SER)/i.test(ap)) setTipo('LIQUIDO');
                else setTipo('');
                
                setClasse('COMUM');
            };

            const handleAnalyze = () => {
                if (!selectedItem || !tipo) return;

                const valorOriginal = selectedItem['VALOR (FRAÇÃO)'] || selectedItem.VALOR || 'R$ 0,00';
                const valor = limparValor(valorOriginal);
                const apresentacao = (selectedItem.APRESENTAÇÃO || '').toUpperCase();
                const descricao = (selectedItem.DESCRIÇÃO || '').toUpperCase();
                const codigo = selectedItem.CÓDIGO || '000000';

                const isSolid = tipo === 'SOLIDO';
                const limite = isSolid ? 5.00 : 35.00;
                const limiteTexto = isSolid ? "R$ 5,00" : "R$ 35,00";
                const descApresentacao = isSolid 
                    ? "apresentações orais sólidas (comprimidos, cápsulas e drágeas)" 
                    : "unidades de medida físicas fechadas ou mililitros (frascos, ampolas, sachês, ML)";

                let status, cabecalho, justificativa, cor;

                if (classe !== 'COMUM') {
                    status = "Necessário Autorização do Plano Servir";
                    cor = "orange";
                    cabecalho = `${codigo} - ${descricao} - ${apresentacao} - PENDENTE/NEGADO - ${status}`;
                    justificativa = `Justificativa Técnica: O item listado pertence à classe terapêutica de EXCLUSÃO EXPRESSA (${classe}). Conforme as diretrizes, classes como antibióticos, antifúngicos e imunossupressores são categorizadas como itens extra pacote e não possuem cobertura embutida na diária básica de Home Care, independentemente do seu valor unitário registrado de ${valorOriginal}. Sendo assim, faz-se estritamente Necessário Autorização do Plano Servir para o devido faturamento e fornecimento da terapia.`;
                } 
                else if (valor <= limite) {
                    status = "Item Incluso";
                    cor = "green";
                    cabecalho = `${codigo} - ${descricao} - ${apresentacao} - AUTORIZADO - ${status}`;
                    justificativa = `Justificativa: O medicamento ${descricao} encontra-se padronizado com o custo unitário de ${valorOriginal} por ${apresentacao}. Como o valor da dose unitária está dentro do teto de ${limiteTexto} para ${descApresentacao}, trata-se de um Item Incluso. Seu fornecimento possui cobertura obrigatória e seus custos já compõem a diária do pacote de Home Care.`;
                } else {
                    status = "Necessário Autorização do Plano Servir";
                    cor = "orange";
                    cabecalho = `${codigo} - ${descricao} - ${apresentacao} - PENDENTE/NEGADO - ${status}`;
                    justificativa = `Justificativa Técnica: O medicamento ${descricao} possui custo unitário registrado a ${valorOriginal} por ${apresentacao}. Devido ao fato de o valor da dose unitária ULTRAPASSAR o teto limite de ${limiteTexto} estabelecido para ${descApresentacao}, trata-se de medicação de alto custo. Logo, o fornecimento não compõe a diária básica, sendo Necessário Autorização do Plano Servir para liberação extra pacote.`;
                }

                setAnalisePronta({ status, cabecalho, justificativa, cor, valorOriginal, descricao, apresentacao, valor });
                setTimeout(() => resultRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
            };

            const copyToClipboard = () => {
                if (!analisePronta) return;
                const text = `${analisePronta.cabecalho}\n\n${analisePronta.justificativa}`;
                navigator.clipboard.writeText(text);
                alert('Texto copiado com sucesso!');
            };

            if (isLoading) {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center">
                        <div className="text-4xl animate-spin mb-4">⏳</div>
                        <h2 className="text-xl font-bold text-slate-700">A carregar Base de Dados...</h2>
                        <p className="text-sm text-slate-500 mt-2">A extrair dados do Google Sheets de forma segura...</p>
                    </div>
                );
            }

            return (
                <div className="p-4 md:p-8 font-sans text-slate-800">
                    <div className="max-w-4xl mx-auto space-y-6">
                        
                        <header className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div className="flex items-center gap-4">
                                <div className="p-3 bg-blue-600 text-white rounded-xl shadow-md text-2xl">📊</div>
                                <div>
                                    <h1 className="text-2xl font-bold text-slate-900 tracking-tight">Auditoria Home Care</h1>
                                    <p className="text-sm text-slate-500">Sistema Automatizado - Plano Servir</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-2 px-3 py-1.5 bg-green-50 text-green-700 rounded-full border border-green-200 text-sm font-medium">
                                ✅ {db.length} itens carregados
                            </div>
                        </header>

                        {error && (
                            <div className="bg-red-50 p-4 rounded-xl border border-red-200 flex items-start gap-3 text-red-800">
                                <span className="text-xl">⚠️</span>
                                <div>
                                    <h3 className="font-bold">Erro de Ligação:</h3>
                                    <p className="text-sm">{error}</p>
                                </div>
                            </div>
                        )}

                        <div className="grid grid-cols-1 md:grid-cols-12 gap-6">
                            
                            <div className="md:col-span-6 space-y-6">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                    <h2 className="font-semibold text-lg mb-4 text-slate-800 flex items-center gap-2">
                                        <span className="bg-blue-100 text-blue-700 w-6 h-6 rounded-full inline-flex items-center justify-center text-xs font-bold">1</span>
                                        Procurar Medicamento
                                    </h2>
                                    
                                    <div className="relative">
                                        <span className="absolute left-3 top-3 text-slate-400">🔍</span>
                                        <input
                                            type="text"
                                            className="w-full pl-10 pr-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                                            placeholder="Ex: UROVIT, DIPIRONA, MEROPENEM..."
                                            value={searchTerm}
                                            onChange={(e) => setSearchTerm(e.target.value)}
                                        />
                                    </div>

                                    {searchTerm && (
                                        <div className="mt-4 border border-slate-200 rounded-xl overflow-hidden divide-y divide-slate-100 bg-white shadow-lg absolute z-10 w-full max-w-md max-h-[400px] overflow-y-auto">
                                            {searchResults.length > 0 ? (
                                                searchResults.map((item, idx) => {
                                                    const prelimStatus = getPreliminaryStatus(item);
                                                    return (
                                                        <div 
                                                            key={idx} 
                                                            className="p-3 hover:bg-slate-50 cursor-pointer transition-colors"
                                                            onClick={() => handleSelect(item)}
                                                        >
                                                            <p className="font-bold text-slate-800 text-sm">{item.DESCRIÇÃO}</p>
                                                            <div className="flex justify-between items-center mt-2">
                                                                <span className="text-[11px] font-medium text-slate-500 bg-slate-100 px-2 py-0.5 rounded uppercase tracking-wider">
                                                                    {item.APRESENTAÇÃO}
                                                                </span>
                                                                <span className={`text-[11px] font-bold px-2 py-0.5 rounded shadow-sm flex items-center gap-1
                                                                    ${prelimStatus.type === 'success' ? 'bg-green-100 text-green-700 border border-green-200' : 
                                                                    prelimStatus.type === 'warn' ? 'bg-orange-100 text-orange-700 border border-orange-200' : 
                                                                    'bg-slate-100 text-slate-600 border border-slate-200'}`}
                                                                >
                                                                    {prelimStatus.type === 'success' ? '✅' : '🛡️'} {prelimStatus.text}
                                                                </span>
                                                            </div>
                                                        </div>
                                                    )
                                                })
                                            ) : (
                                                <div className="p-4 text-center text-slate-500 text-sm">Nenhum resultado encontrado.</div>
                                            )}
                                        </div>
                                    )}

                                    {selectedItem && (
                                        <div className="mt-6 p-4 bg-slate-50 rounded-xl border border-slate-200 relative">
                                            <button onClick={() => setSelectedItem(null)} className="absolute top-2 right-2 text-slate-400 hover:text-red-500" title="Limpar">❌</button>
                                            <p className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Selecionado</p>
                                            <p className="font-bold text-lg text-slate-900 leading-tight">{selectedItem.DESCRIÇÃO}</p>
                                            <p className="text-sm font-medium text-slate-600 mt-1">Apresentação: {selectedItem.APRESENTAÇÃO}</p>
                                            <p className="text-xs text-slate-400 mt-2">Preço de Tabela: {selectedItem['VALOR (FRAÇÃO)'] || selectedItem.VALOR}</p>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="md:col-span-6 space-y-6">
                                {selectedItem && (
                                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 animate-in fade-in duration-500">
                                        <h2 className="font-semibold text-lg mb-6 text-slate-800 flex items-center gap-2">
                                            <span className="bg-blue-100 text-blue-700 w-6 h-6 rounded-full inline-flex items-center justify-center text-xs font-bold">2</span>
                                            Confirmação de Parâmetros
                                        </h2>

                                        <div className="mb-6">
                                            <label className="block text-sm font-semibold text-slate-700 mb-3">Tipo de Medida</label>
                                            <div className="grid grid-cols-2 gap-3">
                                                <button
                                                    onClick={() => setTipo('SOLIDO')}
                                                    className={`flex flex-col items-center p-3 rounded-xl border-2 transition-all ${tipo === 'SOLIDO' ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-slate-200 hover:border-slate-300 text-slate-600'}`}
                                                >
                                                    <span className="text-2xl mb-1">💊</span>
                                                    <span className="font-bold text-xs">Sólido (Teto: R$5)</span>
                                                </button>
                                                <button
                                                    onClick={() => setTipo('LIQUIDO')}
                                                    className={`flex flex-col items-center p-3 rounded-xl border-2 transition-all ${tipo === 'LIQUIDO' ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-slate-200 hover:border-slate-300 text-slate-600'}`}
                                                >
                                                    <span className="text-2xl mb-1">💉</span>
                                                    <span className="font-bold text-xs">Físico/Líquido (Teto: R$35)</span>
                                                </button>
                                            </div>
                                        </div>

                                        <div className="mb-6">
                                            <label className="block text-sm font-semibold text-slate-700 mb-3">Classe Terapêutica</label>
                                            <select 
                                                value={classe}
                                                onChange={(e) => setClasse(e.target.value)}
                                                className="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-medium text-slate-700 cursor-pointer"
                                            >
                                                <option value="COMUM">Medicamento Comum (Regra de Valor)</option>
                                                <option value="ANTIBIÓTICO">🚨 Antibiótico (Exclusão Expressa)</option>
                                                <option value="ANTIFÚNGICO">🚨 Antifúngico Venoso (Exclusão)</option>
                                                <option value="QUIMIOTERÁPICO">🚨 Quimioterápico (Exclusão)</option>
                                                <option value="IMUNOSSUPRESSOR">🚨 Imunossupressor (Exclusão)</option>
                                                <option value="ALBUMINA">🚨 Albumina Humana (Exclusão)</option>
                                            </select>
                                        </div>

                                        <button 
                                            onClick={handleAnalyze}
                                            disabled={!tipo}
                                            className="w-full bg-slate-900 hover:bg-slate-800 disabled:bg-slate-300 disabled:cursor-not-allowed text-white py-4 rounded-xl font-bold text-sm transition-colors flex items-center justify-center gap-2 shadow-lg shadow-slate-900/20"
                                        >
                                            GERAR PARECER TÉCNICO
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                        
                        {analisePronta && (
                            <div ref={resultRef} className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 animate-in fade-in zoom-in-95 duration-300 mb-10">
                                <div className="flex items-center justify-between mb-4 border-b border-slate-100 pb-4">
                                <h2 className="font-semibold text-lg text-slate-800 flex items-center gap-2">
                                    <span className="bg-green-100 text-green-700 w-6 h-6 rounded-full inline-flex items-center justify-center text-xs font-bold">3</span>
                                    Texto Base para o Plano Servir
                                </h2>
                                <button 
                                    onClick={copyToClipboard}
                                    className="flex items-center gap-1.5 text-xs font-bold uppercase tracking-wider bg-blue-100 hover:bg-blue-200 text-blue-800 px-4 py-2 rounded-lg transition-colors"
                                >
                                    📋 Copiar Texto
                                </button>
                                </div>

                                <div className="bg-[#1e1e24] p-5 rounded-xl text-gray-300 font-sans text-sm leading-relaxed shadow-inner">
                                    <div className="mb-4">
                                        <span className={`inline-flex items-center gap-1.5 px-3 py-1 rounded text-xs font-bold border uppercase tracking-wider
                                            ${analisePronta.cor === 'green' ? 'text-green-400 border-green-500/30 bg-green-500/10' : 
                                            'text-orange-400 border-orange-500/30 bg-orange-500/10'}`}
                                        >
                                            {analisePronta.cor === 'green' ? '✅' : '🛡️'} {analisePronta.status}
                                        </span>
                                    </div>
                                    
                                    <p className="font-bold text-white mb-4 tracking-wide">{analisePronta.cabecalho}</p>
                                    <p className="text-gray-400 text-justify">{analisePronta.justificativa}</p>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
